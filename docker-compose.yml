# ZeroClaw Docker Compose Example
# 
# Quick start:
#   1. Copy this file and set your API key
#   2. Run: docker compose up -d
#   3. Access gateway at http://localhost:42617
#
# For more info: https://github.com/zeroclaw-labs/zeroclaw
#
# WhatsApp Web: prebuilt ghcr.io images do not include the `whatsapp-web` feature.
# This compose builds from Dockerfile.debian with `whatsapp-web` (add memory-postgres if you use Postgres memory).
# First build: docker compose build --no-cache  (Rust compile can take a while)

services:
  zeroclaw:
    image: zeroclaw:whatsapp-web
    build:
      context: .
      dockerfile: Dockerfile.debian
      args:
        ZEROCLAW_CARGO_FEATURES: "whatsapp-web"
    # image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    container_name: zeroclaw
    restart: unless-stopped
    
    environment:
      # tracing: RUST_LOG (default info). Override in .env e.g. RUST_LOG=debug
      - RUST_LOG=${RUST_LOG:-debug}
      # Required: set in .env as API_KEY=... (loaded by Compose automatically).
      - API_KEY=${API_KEY:-}
      # Or: ZEROCLAW_API_KEY=${ZEROCLAW_API_KEY:-}

      # Provider, model, and api_url are set in config/config.toml (repo; ~/.zeroclaw/config.toml should symlink there).

      # Allow public bind inside Docker (required for container networking)
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      # Default gateway port inside container
      - ZEROCLAW_GATEWAY_PORT=${ZEROCLAW_GATEWAY_PORT:-42617}

    volumes:
      # Persist workspace and state (config file is overridden by the bind mount).
      - zeroclaw-data:/zeroclaw-data
      - ./config/config.toml:/zeroclaw-data/.zeroclaw/config.toml:ro
      
    ports:
      # Gateway API port (override HOST_PORT if 42617 is taken)
      - "${HOST_PORT:-42617}:${ZEROCLAW_GATEWAY_PORT:-42617}"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 32M

    # Health check — uses lightweight status instead of full diagnostics.
    # For images with curl, prefer: curl -f http://localhost:42617/health
    healthcheck:
      test: ["CMD", "zeroclaw", "status", "--format=exit-code"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  zeroclaw-data:
